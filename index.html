<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>drone-stats — FPV kit</title>
<style>
  :root {
    --bg: #0a0e15;
    --panel: #121926;
    --panel-2: #18202e;
    --line: rgba(255,255,255,.07);
    --line-2: rgba(255,255,255,.12);
    --ink: #eaf0f7;
    --muted: #8595aa;
    --faint: #5a6b80;
    --accent: #34e1c4;
    --have: #46c46a;
    --ordered: #e0ad48;
    --want: #5aa6ff;
    --idea: #9a82e0;
    --alert: #f2603f;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", system-ui, "Segoe UI", sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--ink);
    font-family: var(--sans); -webkit-font-smoothing: antialiased; }
  body { max-width: 1180px; margin: 0 auto; padding: 30px 22px 90px;
    background-image: radial-gradient(60% 50% at 50% -10%, rgba(52,225,196,.07), transparent 70%); }
  a { color: var(--accent); text-decoration: none; }

  /* ---- header ---- */
  header { margin-bottom: 30px; }
  .brand { font-size: 24px; font-weight: 700; letter-spacing: -.02em; }
  .brand b { color: var(--accent); }
  .brand .mono { font-family: var(--mono); font-weight: 400; color: var(--muted);
    font-size: 12px; letter-spacing: 0; margin-left: 10px; }
  .stats { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
  .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 11px 15px; min-width: 92px; flex: 0 0 auto; }
  .stat .n { font-family: var(--mono); font-size: 22px; font-weight: 600; line-height: 1; }
  .stat .l { font-size: 10.5px; color: var(--muted); text-transform: uppercase;
    letter-spacing: .08em; margin-top: 7px; }
  .stat.cost { background: linear-gradient(180deg, rgba(52,225,196,.10), rgba(52,225,196,.02));
    border-color: rgba(52,225,196,.28); }
  .stat.cost .n { color: var(--accent); }
  .stat.alert .n { color: var(--alert); }

  /* ---- build ---- */
  .build { margin-top: 34px; }
  .build-top { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 4px; }
  .build-name { font-size: 18px; font-weight: 650; letter-spacing: -.01em; }
  .targets { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
  .tgt { font-family: var(--mono); font-size: 11px; padding: 3px 9px; border-radius: 7px;
    color: var(--accent); background: rgba(52,225,196,.08); border: 1px solid rgba(52,225,196,.2); }
  .build-summary { color: var(--muted); font-size: 13px; margin: 2px 0 14px; max-width: 70ch; }

  .progress { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .bar { flex: 1; height: 6px; border-radius: 6px; background: var(--panel-2);
    overflow: hidden; border: 1px solid var(--line); }
  .bar > i { display: block; height: 100%; background: linear-gradient(90deg, var(--have), var(--accent)); }
  .progress .pct { font-family: var(--mono); font-size: 11.5px; color: var(--muted); white-space: nowrap; }
  .compat-flag { font-family: var(--mono); font-size: 11px; padding: 3px 9px; border-radius: 7px; white-space: nowrap; }
  .compat-flag.ok { color: var(--have); background: rgba(70,196,106,.1); border: 1px solid rgba(70,196,106,.25); }
  .compat-flag.warn { color: var(--alert); background: rgba(242,96,63,.1); border: 1px solid rgba(242,96,63,.3); cursor: help; }

  /* ---- cards ---- */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 13px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    padding: 15px 16px; display: flex; flex-direction: column; gap: 10px;
    transition: border-color .15s, transform .15s; position: relative; }
  .card:hover { border-color: var(--line-2); transform: translateY(-2px); }
  .card.crit::before { content: ""; position: absolute; left: 0; top: 14px; bottom: 14px;
    width: 3px; border-radius: 3px; background: var(--alert); }
  .row1 { display: flex; align-items: flex-start; gap: 12px; }
  .ico { width: 38px; height: 38px; flex: 0 0 auto; display: grid; place-items: center;
    font-size: 19px; background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 10px; }
  .id { min-width: 0; flex: 1; }
  .nm { font-weight: 600; font-size: 14.5px; letter-spacing: -.01em; line-height: 1.25; }
  .br { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .meta { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex: 0 0 auto; }
  .chip { font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 3px 8px;
    border-radius: 20px; text-transform: uppercase; letter-spacing: .05em; white-space: nowrap; }
  .s-have { color: var(--have); background: rgba(70,196,106,.12); }
  .s-ordered { color: var(--ordered); background: rgba(224,173,72,.12); }
  .s-want { color: var(--want); background: rgba(90,166,255,.12); }
  .s-idea { color: var(--idea); background: rgba(154,130,224,.12); }
  .price { font-family: var(--mono); font-size: 13px; font-weight: 600; }
  .qty { font-family: var(--mono); font-size: 11px; color: var(--muted); }

  .specs { display: flex; flex-wrap: wrap; gap: 5px; }
  .spec { font-family: var(--mono); font-size: 10.5px; padding: 2px 8px; border-radius: 6px;
    border: 1px solid var(--line); color: var(--muted); }
  .spec.match { color: var(--have); border-color: rgba(70,196,106,.3); background: rgba(70,196,106,.06); }
  .spec.miss { color: var(--alert); border-color: rgba(242,96,63,.35); background: rgba(242,96,63,.06); }

  .note { font-size: 12.5px; color: #b3c0d1; line-height: 1.45; }
  .verify { font-size: 11px; color: var(--ordered); display: flex; gap: 5px; align-items: center; }
  .links { display: flex; gap: 8px; margin-top: 2px; }
  .lk { font-size: 11.5px; font-family: var(--mono); padding: 4px 10px; border-radius: 8px;
    border: 1px solid var(--line); color: var(--muted); transition: all .12s; }
  .lk:hover { border-color: var(--accent); color: var(--accent); }
  .lk.buy { color: var(--accent); border-color: rgba(52,225,196,.3); }

  footer { margin-top: 50px; color: var(--faint); font-size: 11px; text-align: center;
    font-family: var(--mono); }
  .err { border: 1px solid var(--alert); background: rgba(242,96,63,.08);
    border-radius: 14px; padding: 20px; font-size: 13.5px; line-height: 1.6; }
  .err code { color: var(--accent); font-family: var(--mono); }
</style>
</head>
<body>
  <header>
    <div class="brand"><b>drone</b>-stats<span class="mono" id="sub">loading…</span></div>
    <div class="stats" id="stats"></div>
  </header>
  <main id="main"></main>
  <footer>static · github-pages-ready · source of truth: data/*.json</footer>

<script>
const STATUS = {
  have:    { label: "Have",    cls: "s-have" },
  ordered: { label: "Ordered", cls: "s-ordered" },
  want:    { label: "Want",    cls: "s-want" },
  idea:    { label: "Idea",    cls: "s-idea" },
};
const TARGET_KEYS = ["videoSystem", "radioProtocol", "cellCount", "connector"];
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
const opts = v => String(v).split("|").map(s => s.trim());
const priceOf = p => (p.retailers || []).find(r => r.price != null) || null;

// tiny built-in compat checker: part's compat tags vs the build's target
function checkBuild(build, partsById) {
  const warnings = [];
  for (const item of build.items) {
    const p = partsById[item.partId];
    if (!p || item.status === "idea") continue;
    for (const [k, want] of Object.entries(build.target || {})) {
      const got = p.compat?.[k];
      if (want && got && !opts(got).includes(want))
        warnings.push(`${p.name}: ${k} is "${got}" but build targets "${want}"`);
    }
  }
  return warnings;
}

async function load() {
  let catalog, kit;
  try {
    [catalog, kit] = await Promise.all([
      fetch("data/catalog.json").then(r => r.json()),
      fetch("data/kit.json").then(r => r.json()),
    ]);
  } catch (e) {
    document.getElementById("main").innerHTML =
      `<div class="err">Couldn't load the data files. If you opened this as a
       <code>file://</code> path the browser blocks <code>fetch()</code>. Serve it:
       <br><br><code>npm start</code><br>then open the printed
       <code>http://localhost</code> URL.</div>`;
    document.getElementById("sub").textContent = "load error";
    return;
  }

  const partsById = Object.fromEntries(catalog.parts.map(p => [p.id, p]));
  const catById = Object.fromEntries(catalog.categories.map(c => [c.id, c]));
  const allItems = kit.builds.flatMap(b => b.items);
  const count = s => allItems.filter(i => i.status === s).length;

  // cost to buy: want + ordered, qty * known price
  let toBuy = 0, cur = "USD";
  for (const i of allItems) {
    if (i.status !== "want" && i.status !== "ordered") continue;
    const pr = priceOf(partsById[i.partId] || {});
    if (pr) { toBuy += pr.price * (i.qty || 1); cur = pr.currency || cur; }
  }
  const critGaps = allItems.filter(i =>
    i.status !== "have" && i.status !== "ordered" &&
    (partsById[i.partId]?.tags || []).includes("critical-path")).length;

  document.getElementById("sub").innerHTML =
    `${esc(kit.owner?.name || "unnamed pilot")} · updated ${esc(kit.owner?.updated || "—")}`;
  document.getElementById("stats").innerHTML = [
    { n: allItems.length, l: "parts" },
    { n: count("have"), l: "have" },
    { n: count("want") + count("ordered"), l: "to buy" },
    { n: critGaps, l: "critical gaps", c: critGaps ? "alert" : "" },
    { n: `~${cur === "USD" ? "$" : ""}${Math.round(toBuy)}`, l: `to buy${cur !== "USD" ? " " + cur : ""}`, c: "cost" },
  ].map(s => `<div class="stat ${s.c || ""}"><div class="n">${esc(s.n)}</div><div class="l">${esc(s.l)}</div></div>`).join("");

  const order = { have: 0, ordered: 1, want: 2, idea: 3 };
  document.getElementById("main").innerHTML = kit.builds.map(build => {
    const items = [...build.items].sort((a, b) => (order[a.status] ?? 9) - (order[b.status] ?? 9));
    const nonIdea = items.filter(i => i.status !== "idea");
    const acquired = nonIdea.filter(i => i.status === "have" || i.status === "ordered").length;
    const pct = nonIdea.length ? Math.round(100 * acquired / nonIdea.length) : 0;
    const warns = checkBuild(build, partsById);
    const flag = warns.length
      ? `<span class="compat-flag warn" title="${esc(warns.join(" — "))}">⚠ ${warns.length} compat issue${warns.length>1?"s":""}</span>`
      : `<span class="compat-flag ok">✓ compatible</span>`;
    const targets = Object.entries(build.target || {}).filter(([,v]) => v)
      .map(([k, v]) => `<span class="tgt">${esc(v)}</span>`).join("");

    const cards = items.map(item => {
      const p = partsById[item.partId];
      if (!p) return `<div class="card"><div class="nm">⚠ unknown part: ${esc(item.partId)}</div></div>`;
      const st = STATUS[item.status] || { label: item.status, cls: "" };
      const cat = catById[p.category] || { icon: "▪" };
      const isCrit = (p.tags || []).includes("critical-path") && item.status !== "have" && item.status !== "ordered";
      const pr = priceOf(p);

      // purposeful spec chips: show the build-target dimensions, colored by match
      const specs = TARGET_KEYS.map(k => {
        const got = p.compat?.[k];
        if (!got) return "";
        const want = build.target?.[k];
        if (want) {
          const ok = opts(got).includes(want);
          return `<span class="spec ${ok ? "match" : "miss"}">${esc(ok ? want : got)}</span>`;
        }
        return `<span class="spec">${esc(opts(got)[0])}${opts(got).length > 1 ? "+" : ""}</span>`;
      }).filter(Boolean).join("");

      const links = [
        (p.retailers || []).find(r => r.url) && `<a class="lk buy" href="${esc((p.retailers.find(r=>r.url)).url)}" target="_blank" rel="noopener">buy ↗</a>`,
        p.links?.review && `<a class="lk" href="${esc(p.links.review)}" target="_blank" rel="noopener">review ↗</a>`,
      ].filter(Boolean).join("");

      return `
        <div class="card${isCrit ? " crit" : ""}">
          <div class="row1">
            <div class="ico">${cat.icon}</div>
            <div class="id">
              <div class="nm">${esc(p.name)}</div>
              <div class="br">${esc(p.brand || "")}</div>
            </div>
            <div class="meta">
              <span class="chip ${st.cls}">${esc(st.label)}</span>
              ${pr ? `<span class="price">${pr.currency==="USD"?"$":""}${esc(pr.price)}${pr.currency!=="USD"?" "+esc(pr.currency):""}</span>` : ""}
              ${item.qty > 1 ? `<span class="qty">×${esc(item.qty)}</span>` : ""}
            </div>
          </div>
          ${specs ? `<div class="specs">${specs}</div>` : ""}
          ${item.note ? `<div class="note">${esc(item.note)}</div>` : ""}
          ${p.specs?.verify ? `<div class="verify">⚑ spec unconfirmed — verify on product page</div>` : ""}
          ${links ? `<div class="links">${links}</div>` : ""}
        </div>`;
    }).join("");

    return `
      <section class="build">
        <div class="build-top">
          <span class="build-name">${esc(build.name)}</span>
          <span class="targets">${targets}</span>
        </div>
        ${build.summary ? `<div class="build-summary">${esc(build.summary)}</div>` : ""}
        <div class="progress">
          <span class="pct">${acquired}/${nonIdea.length} acquired</span>
          <div class="bar"><i style="width:${pct}%"></i></div>
          ${flag}
        </div>
        <div class="grid">${cards}</div>
      </section>`;
  }).join("");
}
load();
</script>
</body>
</html>
